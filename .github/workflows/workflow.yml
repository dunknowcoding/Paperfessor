name: CI & Publish

# Runs tests on every push/PR. Publishes to PyPI when a version tag
# (v1.0.0, v1.0.1, ...) is pushed, using PyPI Trusted Publishing
# (OIDC) — no API token stored in the repo.
#
# One-time PyPI setup (Settings on pypi.org, not in this file):
#   1. Create the "paperfessor" project (or let the first upload create it).
#   2. Add a Trusted Publisher:
#        Owner:            dunknowcoding
#        Repository:       Paperfessor
#        Workflow name:    workflow.yml
#        Environment:      pypi
#   3. In GitHub → Settings → Environments, create an environment named "pypi".
# Then push a tag:  git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    # Only on a version tag, only after tests + build pass.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
